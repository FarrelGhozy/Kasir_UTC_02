<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bengkel UTC - Sistem Manajemen Bengkel dan Kasir">
    <meta name="theme-color" content="#0d6efd">
    <title>Bengkel UTC - Sistem Manajemen Bengkel</title>

    <link rel="icon" type="image/webp" href="assets/logo.webp">

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="./css/styles.css?v=2">

    <style>
        /* Desktop: Sidebar tetap tampil, bottom nav sembunyi */
        @media (min-width: 992px) {
            #sidebar {
                left: 0 !important;
                width: 250px;
            }
            #main-content {
                margin-left: 250px;
            }
            #bottom-nav {
                display: none !important;
            }
            #mobile-nav-dropdown {
                display: none !important;
            }
        }
        /* Mobile: Bottom nav tampil, sidebar sembunyi */
        @media (max-width: 991px) {
            #sidebar {
                display: none !important;
            }
            #main-content {
                margin-left: 0 !important;
                width: 100%;
                padding-bottom: 60px;
            }
        }
    </style>
</head>

<body class="bg-light">
    <div id="login-screen" class="d-flex align-items-center justify-content-center min-vh-100 bg-light p-3">
        <div class="card shadow border-0" style="width: 100%; max-width: 420px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img src="assets/logo.webp" alt="Logo Bengkel UTC" class="mb-3" style="width: 80px; height: auto;">
                    <h3 class="mt-3 fw-bold">Bengkel UTC</h3>
                    <p class="text-muted">Sistem Manajemen Bengkel</p>
                </div>

                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">Nama Pengguna</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="login-username" placeholder="Masukkan username" required autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Kata Sandi</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="login-password" placeholder="Masukkan kata sandi" required autocomplete="current-password">
                        </div>
                    </div>

                    <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="login-btn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
                    </button>
                </form>
                <!--
                    Akun default untuk development:
                    Admin, Kasir, Teknisi — lihat dokumentasi backend/README.md
                -->
            </div>
        </div>
    </div>

    <div id="main-app" class="d-none">
        <nav id="sidebar" class="bg-dark text-white position-fixed h-100 d-flex flex-column shadow-lg">
            <div class="sidebar-header p-4 border-bottom border-secondary">
                <div class="d-flex align-items-center">
                    <img src="assets/logo.webp" alt="Logo Bengkel UTC" class="mb-3" style="width: 50px; height: auto; margin-right: 10px;">
                    <div>
                        <h5 class="mb-0 fw-bold">Bengkel UTC</h5>
                        <small class="text-white-50" id="user-role-badge">Admin</small>
                    </div>
                </div>
            </div>

            <div class="p-3 flex-grow-1 overflow-auto">
                <div class="user-info mb-4 p-3 bg-secondary bg-opacity-25 rounded border border-secondary">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary rounded-circle p-2 me-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                            <i class="bi bi-person-fill text-white fs-5"></i>
                        </div>
                        <div class="overflow-hidden">
                            <strong id="user-name-display" class="d-block text-truncate">Memuat...</strong>
                            <small class="text-white-50" id="user-username-display"></small>
                        </div>
                    </div>
                </div>

                <ul class="nav flex-column nav-pills gap-1" id="main-nav">
                    <li class="nav-item">
                        <a class="nav-link text-white active" href="#" data-page="dashboard">
                            <i class="bi bi-speedometer2 me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item" id="nav-pos">
                        <a class="nav-link text-white" href="#" data-page="pos">
                            <i class="bi bi-cart3 me-2"></i>Kasir (POS)
                        </a>
                    </li>
                    <li class="nav-item" id="nav-service">
                        <a class="nav-link text-white" href="#" data-page="service">
                            <i class="bi bi-wrench me-2"></i>Servis (Workshop)
                        </a>
                    </li>
                    <li class="nav-item" id="nav-orders">
                        <a class="nav-link text-white" href="#" data-page="orders">
                            <i class="bi bi-bag-plus me-2"></i>Pesanan Barang
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#" data-page="inventory">
                            <i class="bi bi-box-seam me-2"></i>Gudang (Inventaris)
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#" data-page="reports">
                            <i class="bi bi-graph-up me-2"></i>Laporan
                        </a>
                    </li>
                    <li class="nav-item mt-3 pt-3 border-top border-secondary admin-only" id="nav-admin-tech">
                        <a class="nav-link text-white" href="#" data-page="admin">
                            <i class="bi bi-gear me-2"></i>Pengaturan Sistem
                        </a>
                    </li>
                </ul>
            </div>

            <div class="p-3 border-top border-secondary">
                <button class="btn btn-danger w-100" id="logout-btn">
                    <i class="bi bi-box-arrow-right me-2"></i>Keluar
                </button>
            </div>
        </nav>

        <main id="main-content" class="min-vh-100 d-flex flex-column">
            <nav class="navbar navbar-light bg-white border-bottom shadow-sm py-3 px-4">
                <div class="container-fluid px-0">
                    <div class="d-flex align-items-center">
                        <h4 class="mb-0 fw-bold text-dark" id="page-title">Dasbor</h4>
                    </div>

                    <div class="d-flex align-items-center gap-2">
                        <div class="dropdown" id="mobile-nav-dropdown">
                            <button class="btn btn-light btn-sm rounded-circle p-1" data-bs-toggle="dropdown" aria-label="Menu lainnya">
                                <i class="bi bi-grid-3x3-gap-fill fs-5"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item" href="#" data-page="orders"><i class="bi bi-bag-plus me-2"></i>Pesanan Barang</a></li>
                                <li><hr class="dropdown-divider d-lg-none"></li>
                                <li class="d-lg-none"><a class="dropdown-item text-danger" href="#" id="logout-btn-mobile"><i class="bi bi-box-arrow-right me-2"></i>Keluar</a></li>
                            </ul>
                        </div>
                        <span class="badge bg-primary bg-opacity-10 text-primary px-2 px-sm-3 py-2 border border-primary border-opacity-25 d-none d-sm-inline" id="current-date"></span>
                        <span class="badge bg-success bg-opacity-10 text-success px-2 px-sm-3 py-2 border border-success border-opacity-25 small" id="current-time"></span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid p-2 p-md-4 flex-grow-1">
                <div id="app-content" class="h-100">
                    <div class="d-flex align-items-center justify-content-center h-100">
                        <div class="text-center">
                            <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                                <span class="visually-hidden">Memuat...</span>
                            </div>
                            <p class="text-muted fs-5">Sedang memuat aplikasi...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <nav id="bottom-nav" class="d-lg-none">
        <div class="bottom-nav-inner">
            <a class="bottom-nav-item active" href="#" data-page="dashboard">
                <i class="bi bi-speedometer2"></i>
            </a>
            <a class="bottom-nav-item" href="#" data-page="pos">
                <i class="bi bi-cart3"></i>
            </a>
            <a class="bottom-nav-item" href="#" data-page="service">
                <i class="bi bi-wrench"></i>
            </a>
            <a class="bottom-nav-item" href="#" data-page="inventory">
                <i class="bi bi-box-seam"></i>
            </a>
            <a class="bottom-nav-item" href="#" data-page="reports">
                <i class="bi bi-graph-up"></i>
            </a>
            <a class="bottom-nav-item admin-only" data-page="admin" id="bottom-nav-admin">
                <i class="bi bi-gear"></i>
            </a>
        </div>
    </nav>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="bottom: 60px !important;" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js?v=8"></script>

    <script type="module">
        import auth from './js/auth.js';
        document.addEventListener("DOMContentLoaded", function() {
            const logoutBtnMobile = document.getElementById('logout-btn-mobile');
            if (logoutBtnMobile) {
                logoutBtnMobile.addEventListener('click', function(e) {
                    e.preventDefault();
                    auth.logout();
                });
            }
        });
    </script>
</body>

</html>
